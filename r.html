<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Recipe — ShelfCentered</title>
<style>
  :root {
    --cream: #F6F3EE;
    --tan: #E8E2D6;
    --sage: #8BA27D;
    --green: #46633F;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--cream);
    color: #333;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .wrap { max-width: 480px; width: 90%; padding: 40px 0 60px; }
  .leaf-logo { display: block; margin: 0 auto 4px; width: 48px; height: 48px; border-radius: 12px; }
  .brand { text-align: center; color: var(--green); font-weight: 700; font-size: 14px; margin-bottom: 24px; letter-spacing: 0.5px; }
  .card { background: #fff; border: 1px solid var(--tan); border-radius: 16px; padding: 24px; }
  h1 { color: var(--green); font-size: 22px; margin: 0 0 12px; }
  .section-label { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 18px; margin-bottom: 6px; font-weight: 700; }
  .ingredients, .instructions { font-size: 14px; line-height: 21px; color: #444; white-space: pre-wrap; }
  .stats { font-size: 13px; color: #888; margin-top: 14px; }
  .buttons { margin-top: 26px; display: flex; flex-direction: column; gap: 10px; }
  .btn { display: block; text-align: center; padding: 14px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 15px; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-secondary { background: var(--tan); color: var(--green); }
  .loading, .error { text-align: center; color: #888; padding: 40px 0; }
</style>
</head>
<body>
  <div class="wrap">
    <img src="logo.png" alt="ShelfCentered" class="leaf-logo" />
    <div class="brand">SHELFCENTERED</div>
    <div id="content" class="card">
      <p class="loading">Loading recipe...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ouhrvnzeotlmdajkpvcy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_8wWAPVt_YimeFzua5a3ydg_SZePYGYF';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getRecipeId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    async function loadRecipe() {
      const id = getRecipeId();
      const content = document.getElementById('content');

      if (!id) {
        content.innerHTML = '<p class="error">No recipe specified.</p>';
        return;
      }

      try {
        const { data, error } = await supabase
          .from('shared_recipes')
          .select('*')
          .eq('id', id)
          .single();

        if (error || !data) {
          console.error('Supabase error loading shared recipe:', error);
          content.innerHTML = `<p class="error">This recipe link is no longer available.</p><p style="font-size:11px;color:#bbb;margin-top:10px;">${error ? escapeHtml(error.message || String(error)) : ''}</p>`;
          return;
        }

        const statsLine = [
          data.prep_time_minutes ? `${data.prep_time_minutes} min` : '',
          data.servings ? `serves ${data.servings}` : '',
        ].filter(Boolean).join(' · ');

        content.innerHTML = `
          <h1>${escapeHtml(data.name)}</h1>
          ${data.ingredients?.length ? `<div class="section-label">Ingredients</div><div class="ingredients">${data.ingredients.map(escapeHtml).join('\n')}</div>` : ''}
          ${data.instructions ? `<div class="section-label">Instructions</div><div class="instructions">${escapeHtml(data.instructions)}</div>` : ''}
          ${statsLine ? `<div class="stats">${statsLine}</div>` : ''}
          <div class="buttons">
            <a class="btn btn-primary" href="shelfcentered://import/${id}">Open in ShelfCentered</a>
            <a class="btn btn-secondary" href="index.html">Don't have the app? Get ShelfCentered</a>
          </div>
        `;
      } catch (err) {
        console.error('Failed to load shared recipe:', err);
        content.innerHTML = `<p class="error">Something went wrong loading this recipe.</p><p style="font-size:11px;color:#bbb;margin-top:10px;">${escapeHtml(err.message || String(err))}</p>`;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    loadRecipe();
  </script>
</body>
</html>
