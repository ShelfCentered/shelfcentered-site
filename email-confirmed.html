<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Confirmed — ShelfCentered</title>
<style>
  :root {
    --cream: #F6F3EE;
    --tan: #E8E2D6;
    --sage: #8BA27D;
    --green: #46633F;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--cream);
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #fff;
    border: 1px solid var(--tan);
    border-radius: 16px;
    padding: 36px 32px;
    max-width: 380px;
    width: 90%;
    text-align: center;
  }
  .leaf-logo { display: block; margin: 0 auto 12px; width: 56px; height: 56px; border-radius: 14px; }
  h1 { color: var(--green); font-size: 22px; margin: 0 0 10px; }
  p { color: #666; font-size: 14px; line-height: 20px; margin: 0; }
</style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="ShelfCentered" class="leaf-logo" />
    <h1>Email confirmed!</h1>
    <p>Your ShelfCentered account is ready. You can close this tab and return to the app to sign in.</p>
  </div>
</body>
</html>
