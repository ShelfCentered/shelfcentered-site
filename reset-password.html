<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — ShelfCentered</title>
<style>
  :root {
    --cream: #F6F3EE;
    --tan: #E8E2D6;
    --sage: #8BA27D;
    --green: #46633F;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--cream);
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #fff;
    border: 1px solid var(--tan);
    border-radius: 16px;
    padding: 32px;
    max-width: 380px;
    width: 90%;
    text-align: center;
  }
  h1 { color: var(--green); font-size: 22px; margin: 0 0 8px; }
  p { color: #777; font-size: 14px; margin: 0 0 24px; }
  input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--tan);
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--green);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  .message { font-size: 13px; margin-top: 14px; }
  .success { color: var(--green); }
  .error { color: #C0392B; }
</style>
</head>
<body>
  <div class="card">
    <h1>Set a new password</h1>
    <p id="subtitle">Enter a new password for your ShelfCentered account.</p>
    <div id="form">
      <input type="password" id="password" placeholder="New password" />
      <input type="password" id="confirmPassword" placeholder="Confirm new password" />
      <button id="submitBtn" onclick="resetPassword()">Update password</button>
    </div>
    <p id="message" class="message"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ouhrvnzeotlmdajkpvcy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_8wWAPVt_YimeFzua5a3ydg_SZePYGYF';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const messageEl = document.getElementById('message');
      const btn = document.getElementById('submitBtn');

      messageEl.textContent = '';
      messageEl.className = 'message';

      if (!password || password.length < 6) {
        messageEl.textContent = 'Password must be at least 6 characters.';
        messageEl.className = 'message error';
        return;
      }
      if (password !== confirmPassword) {
        messageEl.textContent = "Passwords don't match.";
        messageEl.className = 'message error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await supabase.auth.updateUser({ password });

      btn.disabled = false;
      btn.textContent = 'Update password';

      if (error) {
        messageEl.textContent = error.message;
        messageEl.className = 'message error';
      } else {
        document.getElementById('form').style.display = 'none';
        document.getElementById('subtitle').style.display = 'none';
        messageEl.textContent = 'Password updated! You can close this page and sign in with your new password in the app.';
        messageEl.className = 'message success';
      }
    }
  </script>
</body>
</html>
